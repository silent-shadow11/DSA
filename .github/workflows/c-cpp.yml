name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install compiler (optional but safe)
      - name: Install g++
        run: sudo apt-get update && sudo apt-get install -y g++

      # Step 3: Compile code
      - name: Compile
        run: g++ main.cpp -o main

      # Step 4: Run program
      - name: Run
        run: ./main
